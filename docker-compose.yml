services:
  # ── SQLite mode (default) ─────────────────────────────────────────────────────
  sync:
    &app
    build: .
    image: nodepad-sync-server
    container_name: nodepad-sync
    restart: unless-stopped
    ports:
      - "3001:3001"   # WebSocket sync
      - "3100:3100"   # MCP HTTP
    environment:
      PORT: "3001"
      MCP_PORT: "3100"
      AUTH_TOKEN: "changeme"
      DB_TYPE: "sqlite"
      OLLAMA_URL: "http://ollama:11434"
    volumes:
      - nodepad-data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - sqlite
      - default

  # ── Postgres mode ──────────────────────────────────────────────────────────────
  sync-pg:
    <<: *app
    container_name: nodepad-sync-pg
    environment:
      PORT: "3001"
      MCP_PORT: "3100"
      AUTH_TOKEN: "changeme"
      DB_TYPE: "postgres"
      DB_URL: "postgresql://nodepad:changeme@pg:5432/nodepad"
      OLLAMA_URL: "http://ollama:11434"
    depends_on:
      pg:
        condition: service_healthy
      ollama:
        condition: service_healthy
    profiles:
      - pg

  # ── Ollama ─────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nodepad-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - sqlite
      - pg
      - default

  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  pg:
    image: postgres:17-alpine
    container_name: nodepad-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: nodepad
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: nodepad
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nodepad"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - pg

volumes:
  nodepad-data:
  pg-data:
  ollama-models: